<!DOCTYPE html>
<html>
<head>
    <title>Grayscale Grapher</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/14.0.1/math.js"></script>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { width: 512px; position: relative; display: flex; flex-direction: column; border: 1px solid #00ff41; }

        .top-bar { display: flex; background: #0a0a0a; border-bottom: 1px solid #00ff41; padding: 5px; }
        #equation { flex-grow: 1; background: #000; color: #00ff41; border: 1px solid #333; padding: 8px; outline: none; font-family: inherit; }
        button { background: #00ff41; color: #000; border: none; padding: 0 15px; cursor: pointer; font-weight: bold; margin-left: 5px; }
        
        #config { 
            display: none; position: absolute; top: 45px; right: 5px; 
            background: #0a0a0a; border: 1px solid #00ff41; padding: 10px; 
            grid-template-columns: 1fr 1fr; gap: 8px; z-index: 20; 
        }
        .cfg-cell { display: flex; flex-direction: column; }
        #config label { font-size: 9px; color: #888; margin-bottom: 2px; }
        #config input { width: 80px; background: #000; color: #00ff41; border: 1px solid #444; padding: 3px; font-size: 11px; }

        canvas { background: #000; display: block; image-rendering: pixelated; }
        #error { position: absolute; bottom: 5px; left: 5px; right: 5px; background: rgba(255, 0, 0, 0.9); color: #fff; font-size: 11px; padding: 4px; display: none; }
    </style>
</head>
<body>

    <div class="app-container">
        <form class="top-bar" onsubmit="event.preventDefault(); draw();">
            <input type="text" id="equation" value="sin(x^2 + y^2) / (x^2 + y^2 + 1)" spellcheck="false" />
            <button type="submit">RUN</button>
            <button type="button" onclick="toggleConfig()">⚙</button>
        </form>

        <div id="config">
            <div class="cfg-cell"><label>X MIN</label><input type="number" id="xS" value="-10"></div>
            <div class="cfg-cell"><label>X MAX</label><input type="number" id="xE" value="10"></div>
            <div class="cfg-cell"><label>Y MIN</label><input type="number" id="yS" value="-10"></div>
            <div class="cfg-cell"><label>Y MAX</label><input type="number" id="yE" value="10"></div>
            <div class="cfg-cell"><label>Z MIN</label><input type="number" id="zS" value="-0.2"></div>
            <div class="cfg-cell"><label>Z MAX</label><input type="number" id="zE" value="1"></div>
        </div>
        
        <div id="error"></div>
        <canvas id="graphCanvas" width="512" height="512"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('graphCanvas');
        const ctx = canvas.width && canvas.getContext('2d', { alpha: false });
        const err = document.getElementById('error');

        function toggleConfig() {
            const c = document.getElementById('config');
            c.style.display = (c.style.display === 'grid') ? 'none' : 'grid';
        }

        function draw() {
            const w = canvas.width, h = canvas.height;
            const imageData = ctx.createImageData(w, h);
            const data = imageData.data;
            err.style.display = "none";

            const xS = +document.getElementById('xS').value, xE = +document.getElementById('xE').value;
            const yS = +document.getElementById('yS').value, yE = +document.getElementById('yE').value;
            const zS = +document.getElementById('zS').value, zE = +document.getElementById('zE').value;
            const zR = zE - zS;

            try {
                const expr = math.compile(document.getElementById('equation').value);
                
                for (let py = 0; py < h; py++) {
                    const y = yE - (py / (h - 1)) * (yE - yS);
                    const row = py * w * 4;
                    for (let px = 0; px < w; px++) {
                        const x = xS + (px / (w - 1)) * (xE - xS);
                        const v = expr.evaluate({ x, y });
                        
                        const color = Math.max(0, Math.min(255, ((v - zS) / zR) * 255));
                        const i = row + (px * 4);
                        data[i] = data[i+1] = data[i+2] = color;
                        data[i+3] = 255;
                    }
                }
                ctx.putImageData(imageData, 0, 0);
            } catch (e) {
                err.textContent = e.message;
                err.style.display = "block";
            }
        }

        draw();
    </script>
</body>
</html>

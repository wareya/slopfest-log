<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Safetensors Viewer - Geometric</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Cascadia Code','Fira Code','Consolas',monospace;font-size:12px;background:#141414;color:#d4d4d4;display:flex;flex-direction:column;height:100vh}

#hdr{background:#1c1c1c;border-bottom:1px solid #2e2e2e;padding:7px 14px;display:flex;align-items:center;gap:12px;flex-shrink:0;height:38px}
#logo{color:#4fc3f7;font-weight:600;font-size:13px;letter-spacing:.5px}
#open-btn{background:#1c4a72;color:#c8e6fa;border:1px solid #2a6599;padding:3px 10px;border-radius:4px;cursor:pointer;font:inherit;font-size:11px}
#open-btn:hover{background:#235a8a}
#fname{color:#858585;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:500px}
#tc{color:#4ec9b0;font-size:11px;margin-left:auto;white-space:nowrap}

#main{display:flex;flex:1;overflow:hidden}

#left{width:300px;min-width:200px;background:#181818;border-right:1px solid #2e2e2e;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
#lhdr{padding:6px 10px;border-bottom:1px solid #2e2e2e;color:#666;font-size:10px;text-transform:uppercase;letter-spacing:.8px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
#lhdr span{color:#4ec9b0}
#search{padding:6px 10px;background:#1e1e1e;border:none;border-bottom:1px solid #2e2e2e;color:#d4d4d4;font:inherit;font-size:11px;width:100%;outline:none;flex-shrink:0}
#search::placeholder{color:#444}
#search:focus{border-bottom-color:#4fc3f7;background:#202020}
#list{flex:1;overflow-y:auto;overflow-x:hidden}
#list::-webkit-scrollbar{width:5px}
#list::-webkit-scrollbar-track{background:#181818}
#list::-webkit-scrollbar-thumb{background:#3a3a3a;border-radius:3px}
.ti{padding:5px 10px 5px 12px;cursor:pointer;border-left:2px solid transparent;overflow:hidden}
.ti:hover{background:#222}
.ti.sel{background:#1a3a5c;border-left-color:#4fc3f7}
.ti-name{color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:11px}
.ti.sel .ti-name{color:#fff}
.ti-meta{color:#555;font-size:10px;margin-top:1px;display:flex;gap:6px}
.ti.sel .ti-meta{color:#4a7fa8}
.ti-dtype{color:#ce9178}
.ti.sel .ti-dtype{color:#e0a080}

#right{flex:1;display:flex;flex-direction:column;overflow:hidden}

#splash{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;color:#333}
#splash svg{width:64px;height:64px;opacity:.5}
#splash p{font-size:14px}
#splash small{font-size:11px;color:#2a2a2a}
#splash.drag{color:#4fc3f7;border:2px dashed #264f78}

#tview{flex:1;display:none;flex-direction:column;overflow:hidden}

#ibar{padding:10px 16px 8px;border-bottom:1px solid #2e2e2e;background:#1c1c1c;flex-shrink:0}
#tname{color:#ce9178;font-size:13px;margin-bottom:5px;word-break:break-all}
#tmeta{display:flex;gap:16px;flex-wrap:wrap}
.mi{font-size:11px;display:flex;gap:5px}
.ml{color:#666}
.mv{color:#4ec9b0}

#sbar{padding:5px 16px;background:#1a1a1a;border-bottom:1px solid #2e2e2e;display:flex;gap:18px;flex-shrink:0;flex-wrap:wrap}
.si{font-size:10px;color:#555}
.si b{color:#9cdcfe;font-weight:normal}

#cbar{padding:6px 16px;background:#1a1a1a;border-bottom:1px solid #2e2e2e;display:flex;gap:12px;align-items:center;flex-shrink:0}
#cbar label{font-size:11px;color:#888;display:flex;align-items:center;gap:8px}
#custom-shapes{background:#252525;border:1px solid #444;color:#ccc;padding:3px 6px;font:inherit;font-size:11px;width:250px;outline:none}
#custom-shapes:focus{border-color:#4fc3f7}
#apply-shapes{background:#2a6599;color:#fff;border:none;padding:3px 10px;border-radius:3px;cursor:pointer;font-size:11px}
#apply-shapes:hover{background:#3275b0}

#garea{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#111}
#gscroll{flex:1;overflow-y:scroll;overflow-x:auto;position:relative;cursor:default}
#gscroll::-webkit-scrollbar{width:10px;height:10px}
#gscroll::-webkit-scrollbar-track{background:#141414}
#gscroll::-webkit-scrollbar-thumb{background:#333;border-radius:4px;border:2px solid #141414}
#gscroll::-webkit-scrollbar-thumb:hover{background:#555}
#ginner{position:relative;width:100%}
#grows{position:absolute;top:0;left:0;width:100%}

.out-block{padding:12px 16px;border-bottom:1px solid #2e2e2e;box-sizing:border-box}
.out-title{font-size:12px;color:#4fc3f7;margin-bottom:10px;font-weight:600}
.out-shapes{display:flex;flex-wrap:wrap;gap:24px}

.shape-container{display:flex;flex-direction:column;gap:6px}
.shape-title{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:0.5px}
.shape-planes{display:flex;flex-wrap:wrap;gap:12px}

.shape-grid{display:grid;gap:1px;background:#2e2e2e;border:1px solid #2e2e2e}
.shape-cell{background:#141414;width:60px;height:18px;line-height:18px;text-align:right;padding:0 4px;font-size:11px;font-variant-numeric:tabular-nums;color:#d4d4d4;white-space:nowrap;overflow:hidden}
.shape-cell.pos{color:#9cdcfe}
.shape-cell.neg{color:#f48771}
.shape-cell.zer{color:#444}
.shape-cell.nan{color:#f0c040}

#ftr{background:#0e3a5a;padding:3px 16px;font-size:10px;color:#5a9ec8;display:flex;gap:16px;flex-shrink:0}
#no-sel{flex:1;display:flex;align-items:center;justify-content:center;color:#2a2a2a;font-size:14px}
</style>
</head>
<body>

<div id="hdr">
  <span id="logo">⬡ safetenview</span>
  <button id="open-btn">open file</button>
  <input type="file" id="file-input" accept=".safetensors" style="display:none">
  <span id="fname">no file loaded</span>
  <span id="tc"></span>
</div>

<div id="main">
  <div id="left">
    <div id="lhdr">tensors <span id="fc"></span></div>
    <input id="search" placeholder="filter keys..." autocomplete="off" spellcheck="false">
    <div id="list"></div>
  </div>
  <div id="right">
    <div id="splash">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="8" y="8" width="48" height="48" rx="4" stroke="#4fc3f7" stroke-width="1.5"/>
        <rect x="16" y="20" width="10" height="10" rx="1" fill="#4fc3f7" opacity=".6"/>
        <rect x="30" y="20" width="10" height="10" rx="1" fill="#4fc3f7" opacity=".4"/>
        <rect x="44" y="20" width="4" height="10" rx="1" fill="#4fc3f7" opacity=".2"/>
        <rect x="16" y="34" width="10" height="10" rx="1" fill="#4fc3f7" opacity=".4"/>
        <rect x="30" y="34" width="10" height="10" rx="1" fill="#4fc3f7" opacity=".6"/>
        <rect x="44" y="34" width="4" height="10" rx="1" fill="#4fc3f7" opacity=".4"/>
      </svg>
      <p>drop a .safetensors file here</p>
      <small>or click "open file" above</small>
    </div>
    <div id="no-sel" style="display:none">← select a tensor</div>
    <div id="tview">
      <div id="ibar">
        <div id="tname"></div>
        <div id="tmeta"></div>
      </div>
      <div id="sbar"></div>
      <div id="cbar">
        <label title="Comma separated dimensions applied per output rank. e.g. 3x1, 27x9">
          Inner Shapes: 
          <input type="text" id="custom-shapes" placeholder="e.g. 3x1, 27x9" autocomplete="off" spellcheck="false">
        </label>
        <button id="apply-shapes">Apply</button>
      </div>
      <div id="garea">
        <div id="gscroll">
          <div id="ginner">
            <div id="grows"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="ftr">
  <span>↑↓ / click: select tensor</span>
  <span>drag & drop: load file</span>
  <span>scroll: navigate output layer data</span>
</div>

<script>
let fileBuffer = null;
let dataStart = 0;
let tensors = {};
let allKeys =[];
let filteredKeys =[];
let selectedKey = null;
let currentRaw = null;

let currentN = 1;
let currentS = 1;
let currentShapes =[];
let blockHeight = 100;

// ── Safetensors parsing ──────────────────────────────────────────────────
function parseSafetensors(buf) {
  const dv = new DataView(buf);
  const headerSize = Number(dv.getBigUint64(0, true));
  const headerText = new TextDecoder().decode(new Uint8Array(buf, 8, headerSize));
  const header = JSON.parse(headerText);
  dataStart = 8 + headerSize;
  tensors = {};
  for (const[k, v] of Object.entries(header)) {
    if (k !== '__metadata__') tensors[k] = v;
  }
  return Object.keys(tensors).sort((a, b) => a.localeCompare(b));
}

// ── Dtype → typed array ──────────────────────────────────────────────────
function extractRaw(key) {
  const m = tensors[key];
  const [s, e] = m.data_offsets;
  const slice = fileBuffer.slice(dataStart + s, dataStart + e);
  switch (m.dtype) {
    case 'F32':  return { arr: new Float32Array(slice), isFloat: true };
    case 'F64':  return { arr: new Float64Array(slice), isFloat: true };
    case 'I8':   return { arr: new Int8Array(slice), isFloat: false };
    case 'I16':  return { arr: new Int16Array(slice), isFloat: false };
    case 'I32':  return { arr: new Int32Array(slice), isFloat: false };
    case 'I64':  return { arr: new BigInt64Array(slice), isFloat: false, isBig: true };
    case 'U8':   return { arr: new Uint8Array(slice), isFloat: false };
    case 'U16':  return { arr: new Uint16Array(slice), isFloat: false };
    case 'U32':  return { arr: new Uint32Array(slice), isFloat: false };
    case 'U64':  return { arr: new BigUint64Array(slice), isFloat: false, isBig: true };
    case 'BOOL': return { arr: new Uint8Array(slice), isFloat: false };
    case 'F16':  return { arr: f16ToF32(new Uint16Array(slice)), isFloat: true };
    case 'BF16': return { arr: bf16ToF32(new Uint16Array(slice)), isFloat: true };
    default:     return { arr: new Uint8Array(slice), isFloat: false };
  }
}

function f16ToF32(u16) {
  const out = new Float32Array(u16.length);
  for (let i = 0; i < u16.length; i++) {
    const v = u16[i], s = v >> 15, e = (v >> 10) & 0x1f, f = v & 0x3ff;
    if (e === 0) out[i] = (s ? -1 : 1) * Math.pow(2, -14) * f / 1024;
    else if (e === 31) out[i] = f ? NaN : (s ? -Infinity : Infinity);
    else out[i] = (s ? -1 : 1) * Math.pow(2, e - 15) * (1 + f / 1024);
  }
  return out;
}

function bf16ToF32(u16) {
  const buf4 = new ArrayBuffer(u16.length * 4);
  const out = new Float32Array(buf4);
  const u32 = new Uint32Array(buf4);
  for (let i = 0; i < u16.length; i++) u32[i] = u16[i] << 16;
  return out;
}

// ── Stats ────────────────────────────────────────────────────────────────
function computeStats(arr, isBig) {
  if (isBig) {
    if (arr.length === 0) return { min: '—', max: '—', mean: '—', std: '—' };
    let mn = arr[0], mx = arr[0];
    for (let i = 1; i < arr.length; i++) { if (arr[i] < mn) mn = arr[i]; if (arr[i] > mx) mx = arr[i]; }
    return { min: mn.toString(), max: mx.toString(), mean: '—', std: '—' };
  }
  const n = arr.length;
  if (!n) return { min: '—', max: '—', mean: '—', std: '—' };
  let mn = arr[0], mx = arr[0], sum = 0, nanCount = 0;
  for (let i = 0; i < n; i++) {
    const v = arr[i];
    if (!isFinite(v)) { nanCount++; continue; }
    if (v < mn) mn = v; if (v > mx) mx = v; sum += v;
  }
  const valid = n - nanCount;
  const mean = sum / valid;
  let varSum = 0;
  for (let i = 0; i < n; i++) { const v = arr[i]; if (isFinite(v)) varSum += (v - mean) ** 2; }
  const std = Math.sqrt(varSum / valid);
  const fmt = v => isFinite(v) ? v.toPrecision(5) : v.toString();
  return { min: fmt(mn), max: fmt(mx), mean: fmt(mean), std: fmt(std),
    nan: nanCount ? ` (${nanCount} nan/inf)` : '' };
}

// ── Format a single value ─────────────────────────────────────────────────
function getMagStyle(v) {
  let mag = Math.min(1, Math.max(0, Math.abs(v)));
  let gx = 168;
  if (v > 0) {
    let r = Math.round(gx + (156 - gx) * mag);
    let g = Math.round(gx + (220 - gx) * mag);
    let b = Math.round(gx + (254 - gx) * mag);
    return `color: rgb(${r}, ${g}, ${b});`;
  } else if (v < 0) {
    let r = Math.round(gx + (244 - gx) * mag);
    let g = Math.round(gx + (135 - gx) * mag);
    let b = Math.round(gx + (113 - gx) * mag);
    return `color: rgb(${r}, ${g}, ${b});`;
  }
  return 'color: rgb(68, 68, 68);';
}

function fmtVal(v, isFloat, isBig) {
  if (isBig) {
    let numV = Number(v);
    return { text: v.toString(), cls: '', style: getMagStyle(numV) };
  }
  if (isNaN(v)) return { text: 'nan', cls: 'nan', style: '' };
  if (!isFinite(v)) return { text: v > 0 ? '∞' : '-∞', cls: 'nan', style: '' };
  if (v === 0) return { text: isFloat ? '0.0000' : '0', cls: '', style: 'color: rgb(68, 68, 68);' };
  
  const text = isFloat ? v.toFixed(4) : v.toString();
  return { text, cls: '', style: getMagStyle(v) };
}

// ── Grid Layout & Shapes ──────────────────────────────────────────────────
function parseShapes(str) {
  if (!str.trim()) return null;
  const parts = str.split(',').map(s => s.trim()).filter(Boolean);
  const shapes =[];
  for (const p of parts) {
    const dims = p.split(/x|\*/i).map(Number);
    if (dims.some(isNaN) || dims.length === 0 || dims.some(d => d <= 0)) return null;
    shapes.push(dims);
  }
  return shapes.length ? shapes : null;
}

function normalizeShape(dims, titleOverride) {
  const size = dims.reduce((a, b) => a * b, 1);
  const title = titleOverride || dims.join('×');
  if (dims.length === 1 && size > 64) {
    const cols = 32;
    const rows = Math.ceil(size / cols);
    return { dims: [rows, cols], size, title: titleOverride || `${size} (wrapped)` };
  }
  return { dims, size, title };
}

function configureShapes() {
  if (!currentRaw) return;
  const m = tensors[selectedKey];
  
  if (m.shape.length === 0) {
    currentN = 1;
    currentS = 1;
  } else if (m.shape.length === 1) {
    // Treat massive 1D vectors as segmented chunks for virtualization
    currentS = 1024;
    currentN = Math.ceil(m.shape[0] / currentS);
    if (m.shape[0] < currentS) {
       currentS = m.shape[0];
       currentN = 1;
    }
  } else {
    // Native Safetensors layers usually have out_channels on index 0
    currentN = m.shape[0];
    currentS = m.shape.slice(1).reduce((a, b) => a * b, 1);
  }

  const customStr = document.getElementById('custom-shapes').value;
  let customShapes = parseShapes(customStr);
  
  if (customShapes && customShapes.length > 0) {
    let shapes =[];
    let used = 0;
    for (const dims of customShapes) {
      const size = dims.reduce((a, b) => a * b, 1);
      if (used + size <= currentS) {
        shapes.push(normalizeShape(dims));
        used += size;
      } else {
        const rem = currentS - used;
        if (rem > 0) shapes.push(normalizeShape([rem], `remainder (${rem})`));
        used += rem;
        break;
      }
    }
    if (used < currentS) {
      shapes.push(normalizeShape([currentS - used], `remainder (${currentS - used})`));
    }
    currentShapes = shapes;
  } else {
    if (m.shape.length <= 1) {
      currentShapes = [normalizeShape([currentS], `all (${currentS})`)];
    } else {
      currentShapes = [normalizeShape(m.shape.slice(1))];
    }
  }
  
  measureBlockHeight();
  renderRows();
}

function measureBlockHeight() {
  const block = document.createElement('div');
  block.className = 'out-block';
  
  let html = '';
  if (currentN > 1) {
    html += `<div class="out-title">Output Index: 0</div>`;
  }
  html += `<div class="out-shapes">`;
  
  for (const sh of currentShapes) {
    const dims = sh.dims;
    let planes = 1, rows = 1, cols = dims[0];
    if (dims.length >= 2) {
      planes = dims.slice(0, -2).reduce((a, b) => a * b, 1);
      rows = dims[dims.length - 2];
      cols = dims[dims.length - 1];
    }
    
    const cellW = 60;
    const cellH = 18;
    const gap = 1;
    const gridW = cols * cellW + (cols - 1) * gap;
    const gridH = rows * cellH + (rows - 1) * gap;
    
    html += `<div class="shape-container">
      <div class="shape-title">${sh.title}</div>
      <div class="shape-planes">`;
    for(let p = 0; p < planes; p++) {
      html += `<div style="width:${gridW}px; height:${gridH}px; border:1px solid transparent;"></div>`;
    }
    html += `</div></div>`;
  }
  html += `</div>`;
  
  block.innerHTML = html;
  block.style.visibility = 'hidden';
  block.style.position = 'absolute';
  block.style.left = '0';
  block.style.top = '0';
  block.style.width = '100%';
  
  const scroller = document.getElementById('gscroll');
  scroller.appendChild(block);
  blockHeight = block.offsetHeight;
  scroller.removeChild(block);
}

function renderRows() {
  if (!currentRaw) return;
  const scroller = document.getElementById('gscroll');
  const ginner = document.getElementById('ginner');
  const grows = document.getElementById('grows');

  if (blockHeight <= 0) return;

  const totalH = currentN * blockHeight;
  ginner.style.height = totalH + 'px';

  function render() {
    const scrollTop = scroller.scrollTop;
    const visH = scroller.clientHeight;
    
    const OVERSCAN = 2;
    const firstRow = Math.max(0, Math.floor(scrollTop / blockHeight) - OVERSCAN);
    const lastRow = Math.min(currentN - 1, Math.ceil((scrollTop + visH) / blockHeight) + OVERSCAN);

    let html = '';
    const { arr, isFloat, isBig } = currentRaw;
    
    for (let i = firstRow; i <= lastRow; i++) {
      const top = i * blockHeight;
      html += `<div class="out-block" style="position:absolute; top:${top}px; left:0; width:100%;">`;
      
      if (currentN > 1) {
        html += `<div class="out-title">Output Index: ${i}</div>`;
      }
      
      html += `<div class="out-shapes">`;
      let dataOffset = i * currentS;
      
      for (const sh of currentShapes) {
        html += `<div class="shape-container">
          <div class="shape-title">${sh.title}</div>
          <div class="shape-planes">`;
          
        const dims = sh.dims;
        let planes = 1, rows = 1, cols = dims[0];
        if (dims.length >= 2) {
          planes = dims.slice(0, -2).reduce((a, b) => a * b, 1);
          rows = dims[dims.length - 2];
          cols = dims[dims.length - 1];
        }
        
        let shapeItemsDrawn = 0;
        for (let p = 0; p < planes; p++) {
          html += `<div class="shape-grid" style="grid-template-columns: repeat(${cols}, 60px); grid-auto-rows: 18px;">`;
          for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
              if (shapeItemsDrawn < sh.size && dataOffset < arr.length) {
                const { text, cls, style } = fmtVal(arr[dataOffset], isFloat, isBig);
                const clsAttr = cls ? ` ${cls}` : '';
                const styleAttr = style ? ` style="${style}"` : '';
                html += `<div class="shape-cell${clsAttr}"${styleAttr}>${text}</div>`;
                dataOffset++;
                shapeItemsDrawn++;
              } else {
                html += `<div class="shape-cell"></div>`;
              }
            }
          }
          html += `</div>`; 
        }
        html += `</div></div>`;
      }
      html += `</div></div>`;
    }
    
    grows.innerHTML = html;
  }

  scroller.onscroll = render;
  render();
}

// ── Select a tensor ──────────────────────────────────────────────────────
function selectTensor(key) {
  if (!tensors[key]) return;
  selectedKey = key;

  document.querySelectorAll('.ti').forEach(el => el.classList.toggle('sel', el.dataset.key === key));

  const m = tensors[key];
  document.getElementById('no-sel').style.display = 'none';
  const tv = document.getElementById('tview');
  tv.style.display = 'flex';

  document.getElementById('tname').textContent = key;
  document.getElementById('tmeta').innerHTML =
    `<div class="mi"><span class="ml">dtype</span><span class="mv">${m.dtype}</span></div>` +
    `<div class="mi"><span class="ml">shape</span><span class="mv">[${m.shape.join(', ')}]</span></div>` +
    `<div class="mi"><span class="ml">elements</span><span class="mv">${m.shape.reduce((a,b)=>a*b,1).toLocaleString()}</span></div>` +
    `<div class="mi"><span class="ml">bytes</span><span class="mv">${(m.data_offsets[1]-m.data_offsets[0]).toLocaleString()}</span></div>`;

  document.getElementById('sbar').innerHTML = '<span class="si">computing stats…</span>';

  currentRaw = extractRaw(key);
  
  document.getElementById('gscroll').scrollTop = 0;
  configureShapes();

  setTimeout(() => {
    const st = computeStats(currentRaw.arr, currentRaw.isBig);
    document.getElementById('sbar').innerHTML =
      `<div class="si">min <b>${st.min}</b></div>` +
      `<div class="si">max <b>${st.max}</b></div>` +
      `<div class="si">mean <b>${st.mean}</b></div>` +
      `<div class="si">std <b>${st.std}</b></div>` +
      (st.nan ? `<div class="si" style="color:#f0c040">${st.nan}</div>` : '');
  }, 10);
}

// ── Render tensor list ────────────────────────────────────────────────────
function renderList() {
  const q = document.getElementById('search').value.toLowerCase();
  filteredKeys = q ? allKeys.filter(k => k.toLowerCase().includes(q)) : allKeys;
  document.getElementById('fc').textContent = filteredKeys.length;

  let html = '';
  for (const k of filteredKeys) {
    const m = tensors[k];
    const shape = m.shape.join('×');
    const sel = k === selectedKey ? ' sel' : '';
    html += `<div class="ti${sel}" data-key="${k}">
      <div class="ti-name">${escHtml(k)}</div>
      <div class="ti-meta"><span class="ti-dtype">${m.dtype}</span><span>[${shape}]</span></div>
    </div>`;
  }
  document.getElementById('list').innerHTML = html || '<div style="padding:10px;color:#333;font-size:11px">no matches</div>';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Load file ─────────────────────────────────────────────────────────────
function loadFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      fileBuffer = e.target.result;
      allKeys = parseSafetensors(fileBuffer);
      document.getElementById('fname').textContent = file.name;
      document.getElementById('tc').textContent = `${allKeys.length} tensors`;
      document.getElementById('splash').style.display = 'none';
      selectedKey = null;
      currentRaw = null;
      document.getElementById('tview').style.display = 'none';
      document.getElementById('no-sel').style.display = 'flex';
      renderList();
      if (allKeys.length > 0) selectTensor(allKeys[0]);
    } catch (err) {
      alert('Failed to parse safetensors file:\n' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

// ── Event wiring ──────────────────────────────────────────────────────────
document.getElementById('open-btn').onclick = () => document.getElementById('file-input').click();
document.getElementById('file-input').onchange = e => loadFile(e.target.files[0]);
document.getElementById('search').oninput = renderList;

document.getElementById('list').addEventListener('click', e => {
  const ti = e.target.closest('.ti');
  if (ti) selectTensor(ti.dataset.key);
});

document.getElementById('apply-shapes').onclick = () => {
  document.getElementById('gscroll').scrollTop = 0;
  configureShapes();
};
document.getElementById('custom-shapes').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    document.getElementById('gscroll').scrollTop = 0;
    configureShapes();
  }
});

document.addEventListener('keydown', e => {
  if (!allKeys.length) return;
  if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
    e.preventDefault();
    const idx = filteredKeys.indexOf(selectedKey);
    const next = e.key === 'ArrowDown'
      ? Math.min(filteredKeys.length - 1, idx + 1)
      : Math.max(0, idx - 1);
    if (filteredKeys[next]) {
      selectTensor(filteredKeys[next]);
      const items = document.querySelectorAll('.ti');
      if (items[next]) items[next].scrollIntoView({ block: 'nearest' });
    }
  }
});

document.addEventListener('dragover', e => { e.preventDefault(); document.getElementById('splash').classList.add('drag'); });
document.addEventListener('dragleave', () => document.getElementById('splash').classList.remove('drag'));
document.addEventListener('drop', e => {
  e.preventDefault();
  document.getElementById('splash').classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f) loadFile(f);
});

window.addEventListener('resize', () => {
  if (selectedKey) {
    measureBlockHeight();
    renderRows();
  }
});
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PBR Material Tester</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: monospace; display: flex; overflow: hidden; }
        #ui { width: 280px; padding: 20px; border-right: 1px solid #333; height: 100vh; box-sizing: border-box; overflow-y: auto; z-index: 10; }
        input, select { display: block; margin-bottom: 8px; width: 100%; background: #222; color: #fff; border: 1px solid #444; padding: 5px; box-sizing: border-box; }
        label { display: block; font-size: 11px; color: #888; text-transform: uppercase; margin-top: 10px; }
        .texture-unit { margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .unload-btn { width: 100%; background: #422; color: #f88; border: 1px solid #633; cursor: pointer; font-size: 10px; padding: 4px; text-transform: uppercase; }
        .unload-btn:hover { background: #622; }
        canvas { flex-grow: 1; cursor: grab; }
        .info { font-size: 10px; color: #666; margin-top: 10px; line-height: 1.4; }
        hr { border: 0; border-top: 1px solid #333; margin: 20px 0; }
    </style>
</head>
<body>

<div id="ui">
    <label>Geometry</label>
    <select id="geomType">
        <option value="sphere">Sphere</option>
        <option value="cube">Cube</option>
    </select>

    <label>Sun Intensity</label>
    <input type="range" id="sunVal" min="0" max="10" step="0.1" value="2">

    <label>Ambient Intensity</label>
    <input type="range" id="ambVal" min="0" max="2" step="0.01" value="0.5">

    <label>Normalmap Strength</label>
    <input type="range" id="normVal" min="0" max="1" step="0.01" value="0.5">
    
    <label>Environment Map</label>
    <select id="envType">
        <option value="none" selected>None</option>
        <option value="built-in">Built-in (Room)</option>
    </select>
    
    <hr>
    
    <div class="texture-unit">
        <label>Albedo (sRGB)</label>
        <input type="file" id="map">
        <button class="unload-btn" data-prop="map">Unload</button>
    </div>

    <div class="texture-unit">
        <label>Normal (Linear)</label>
        <input type="file" id="normalMap">
        <button class="unload-btn" data-prop="normalMap">Unload</button>
    </div>

    <div class="texture-unit">
        <label>Roughness (Linear)</label>
        <input type="file" id="roughnessMap">
        <button class="unload-btn" data-prop="roughnessMap">Unload</button>
    </div>

    <div class="texture-unit">
        <label>Metalness (Linear)</label>
        <input type="file" id="metalnessMap">
        <button class="unload-btn" data-prop="metalnessMap">Unload</button>
    </div>

    <div class="texture-unit">
        <label>AO (Linear)</label>
        <input type="file" id="aoMap">
        <button class="unload-btn" data-prop="aoMap">Unload</button>
    </div>

    <div class="info">
        <b>Left Click Drag:</b> Rotate View<br>
        <b>Space + Left Drag:</b> Rotate Sun<br>
        <b>Right Click Drag:</b> Pan<br>
        <b>Scroll:</b> Zoom<br>
    </div>
</div>

<script type="importmap">

            "three": "https://unpkg.com/three@0.183.2/build/three.module.js",

        } 
    }
</script>

    gridHelper.position.y = -0.8; // Align with the bottom of the sphere

        // Create a procedural sun texture
        const canvas = document.createElement('canvas');
        canvas.width = 128; canvas.height = 128;
        const ctx = canvas.getContext('2d');
        const grad = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
        grad.addColorStop(0, 'rgba(255, 255, 255, 1)');
        grad.addColorStop(0.2, 'rgba(255, 255, 220, 0.6)');
        grad.addColorStop(0.5, 'rgba(255, 200, 100, 0.1)');

        ctx.fillRect(0, 0, 128, 128);

        const sunSprite = new THREE.Sprite(new THREE.SpriteMaterial({ 
            map: new THREE.CanvasTexture(canvas), 
            blending: THREE.AdditiveBlending 
        }));
        sunSprite.scale.set(5, 5, 1); // Make it look large in the "sky"
        scene.add(sunSprite);
        // Helper function to keep sprite and light in sync
        function updateSunPosition(phi, theta) {
            const distance = 40; // Keeps it far away like a skybox element
            sun.position.setFromSphericalCoords(distance, phi, theta);
            sunSprite.position.copy(sun.position);
        }

    {
        // Initialize position
        let sunPhi = Math.PI / 4, sunTheta = Math.PI / 4;
        updateSunPosition(sunPhi, sunTheta);
    }
    
    const sphereGeom = new THREE.SphereGeometry(0.8, 64, 64);
    for (let i = 0; i < sphereGeom.attributes.uv.array.length; i += 2) {
        sphereGeom.attributes.uv.array[i] *= 4.0;
        sphereGeom.attributes.uv.array[i+1] *= 2.0;
    }
    const cubeGeom = new THREE.BoxGeometry(1, 1, 1);
    
    const material = new THREE.MeshStandardMaterial({ 
        color: 0xffffff, 
        metalness: 0.0, 
        roughness: 0.5 
    });
    
    material.shadowSide = THREE.DoubleSide;
    //sun.shadow.bias = -0.0001;
    sun.shadow.bias = -0.0003;
    //sun.shadow.normalBias = 0.03;

    mesh.castShadow = true;
    mesh.receiveShadow = true;
    
    scene.add(mesh);

    const handleFile = (id, prop) => {
        document.getElementById(id).onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const url = URL.createObjectURL(file);
            loader.load(url, (t) => {
                t.flipY = true;
                t.wrapT = THREE.RepeatWrapping;
                t.wrapS = THREE.RepeatWrapping;
                t.anisotropy = maxAnisotropy;
                t.colorSpace = (prop === 'map') ? THREE.SRGBColorSpace : THREE.NoColorSpace;
                
                if (material[prop]) material[prop].dispose();
                material[prop] = t;

                // Ensure multiplier is 1.0 when a map is present
                if (prop === 'metalnessMap') material.metalness = 1.0;
                if (prop === 'roughnessMap') material.roughness = 1.0;
                
                if (prop === 'aoMap') {
                    sphereGeom.attributes.uv2 = sphereGeom.attributes.uv;
                    cubeGeom.attributes.uv2 = cubeGeom.attributes.uv;
                }
                material.needsUpdate = true;
            });
        };
    };

    ['map', 'normalMap', 'roughnessMap', 'metalnessMap', 'aoMap'].forEach(p => handleFile(p, p));

    material.normalScale.set(0.5, 0.5);
    
    document.querySelectorAll('.unload-btn').forEach(btn => {
        btn.onclick = () => {
            const prop = btn.getAttribute('data-prop');
            if (material[prop]) {
                material[prop].dispose();
                material[prop] = null;
                document.getElementById(prop).value = "";

                // Revert to defaults if map is removed
                if (prop === 'metalnessMap') material.metalness = 0.0;
                if (prop === 'roughnessMap') material.roughness = 0.5;
                
                material.needsUpdate = true;
            }
        };
    });

    document.getElementById('geomType').onchange = (e) => {
        mesh.geometry = (e.target.value === 'sphere') ? sphereGeom : cubeGeom;
    };
    document.getElementById('sunVal').oninput = (e) => sun.intensity = parseFloat(e.target.value);
    document.getElementById('ambVal').oninput = (e) => {
        ambient.intensity = parseFloat(e.target.value);
        if (scene.environment == null) {
            scene.background = new THREE.Color(ambient.intensity * 0.5, ambient.intensity * 0.5, ambient.intensity * 0.5);
        }
    }
    document.getElementById('normVal').oninput = (e) => {
        let x = parseFloat(e.target.value);
        material.normalScale.set(x, x);
    }
    document.getElementById('envType').onchange = (e) => {
        const isBuiltIn = e.target.value === 'built-in';
        scene.environment = isBuiltIn ? roomEnv : null;
        scene.background = isBuiltIn ? roomEnv : new THREE.Color(ambient.intensity * 0.5, ambient.intensity * 0.5, ambient.intensity * 0.5);
    };

    let isSpaceDown = false;
    let sunPhi = Math.PI / 4, sunTheta = Math.PI / 4;
    window.addEventListener('keydown', (e) => { if (e.code === 'Space') { isSpaceDown = true; controls.enabled = false; } });
    window.addEventListener('keyup', (e) => { if (e.code === 'Space') { isSpaceDown = false; controls.enabled = true; } });

    renderer.domElement.addEventListener('mousemove', (e) => {
        if (isSpaceDown && e.buttons === 1) {
            sunTheta -= e.movementX * 0.01;
            sunPhi += e.movementY * 0.01;
            sunPhi = Math.max(0.1, Math.min(Math.PI - 0.1, sunPhi));
            sun.position.setFromSphericalCoords(7, sunPhi, sunTheta);
            updateSunPosition(sunPhi, sunTheta);
        }
    });
    
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.onresize = () => {
        const w = window.innerWidth - 280;
        camera.aspect = w / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(w, window.innerHeight);
    };
</script>
</body>
</html>
